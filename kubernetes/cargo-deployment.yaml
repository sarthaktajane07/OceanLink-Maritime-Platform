apiVersion: apps/v1
kind: Deployment
metadata:
  name: cargo-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cargo-service
  template:
    metadata:
      labels:
        app: cargo-service
    spec:
      containers:
      - name: cargo-service
        image: sarthaktajane07/oceanlink-cargo-service:v1
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: cargo-service
spec:
  selector:
    app: cargo-service
  ports:
  - port: 5001
    targetPort: 5001
  type: ClusterIP
