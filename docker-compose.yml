version: '3.8'

services:
  vessel-service:
    build: ./vessel-service
    container_name: vessel-service
    ports:
      - "5000:5000"

  cargo-service:
    build: ./cargo-service
    container_name: cargo-service
    ports:
      - "5001:5001"

  weather-service:
    build: ./weather-service
    container_name: weather-service
    ports:
      - "5002:5002"

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "5003:5003"

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - vessel-service
      - cargo-service
      - weather-service
      - analytics-service
