server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/vessels {
        proxy_pass http://vessel-service:5000/api/vessels;
    }

    location /api/cargo {
        proxy_pass http://cargo-service:5001/api/cargo;
    }

    location /api/weather {
        proxy_pass http://weather-service:5002/api/weather;
    }

    location /api/analytics {
        proxy_pass http://analytics-service:5003/api/analytics;
    }
}
